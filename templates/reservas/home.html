<!DOCTYPE html>
{% load static %}
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sítio Vianas</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background-image: url("{% static 'imagens/sitiovianas.png' %}");
    background-size: cover;
    background-position: center;
}

.container{

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:rgba(0, 0, 0, 0.574);

}

h1{

color:white;

margin-bottom:40px;

}

.botao{

width:250px;

padding:18px;

margin:10px;

border-radius:10px;

border:none;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

.calendario{

background:#27ae60;

color:white;

}

.reserva{

background:#2980b9;

color:white;

}

.instagram{

background:#e1306c;

color:white;

}

.whatsapp-float{
position: fixed;
bottom: 25px;
right: 25px;
display: flex;
align-items: center;
background: #25D366;
border-radius: 50px;
padding: 8px 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
z-index: 999;
text-decoration: none;
transition: 0.3s;
}

.whatsapp-float img{
width: 35px;
height: 35px;
margin-left: 8px;
}

.whatsapp-text{
color: white;
font-weight: bold;
font-size: 14px;
font-family: Arial;
}

.whatsapp-float:hover{
transform: scale(1.05);
background: #1ebe5d;
}

</style>

</head>

<body>

<div class="container">

<h1>Sítio Vianas 🏡</h1>

<button class="botao calendario" onclick="window.location.href='/calendario/'">
📅 Ver Calendário
</button>

<button class="botao reserva" onclick="window.location.href='/reservar/'">
📝 Fazer Reserva
</button>

<button class="botao instagram" onclick="window.open('https://instagram.com/vianassitio?igsh=aXBseGNia2FnZGVn', '_blank')">
📷 Instagram
</button>

</div>

<a href="https://wa.me/5511974166149" target="_blank" class="whatsapp-float">
    <span class="whatsapp-text">Fale conosco</span>
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>
</body>

</html>
